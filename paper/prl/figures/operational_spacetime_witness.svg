 <g class="sm"><text x="-5" y="42">positive</text><text x="-5" y="91">multiplicity</text><text x="-5" y="140">kernel mismatch</text><text x="-5" y="189">hidden growth</text></g>
 <g transform="translate(120,10)">
  <rect x="0" y="0" width="680" height="196" fill="#fff" stroke="#aaa"/>

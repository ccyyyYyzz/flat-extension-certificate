<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
<rect width="1080" height="720" fill="white"/>
<style>text{font-family:Arial,sans-serif;fill:#111}.t{font-size:21px;font-weight:bold}.s{font-size:17px}.sm{font-size:14px}.box{fill:#f4f7fa;stroke:#324a5f;stroke-width:2}.good{fill:#e9f7ef}.bad{fill:#fcebea}.axis{stroke:#333;stroke-width:2}.line1{fill:none;stroke:#1f77b4;stroke-width:4}.line2{fill:none;stroke:#d95f02;stroke-width:4;stroke-dasharray:8 6}.line3{fill:none;stroke:#7570b3;stroke-width:4;stroke-dasharray:3 5}</style>
<text x="25" y="35" class="t">a  Beyond Hilbert-space dimension witnesses</text>
<g transform="translate(25,55)">
 <rect x="0" y="20" width="195" height="88" rx="8" class="box"/><text x="98" y="54" text-anchor="middle" class="s">black-box</text><text x="98" y="78" text-anchor="middle" class="s">probabilities</text>
 <rect x="260" y="20" width="195" height="88" rx="8" class="box"/><text x="358" y="54" text-anchor="middle" class="s">response</text><text x="358" y="78" text-anchor="middle" class="s">Jacobians</text>
 <rect x="520" y="20" width="195" height="88" rx="8" class="box"/><text x="618" y="54" text-anchor="middle" class="s">three-obstruction</text><text x="618" y="78" text-anchor="middle" class="s">audit</text>
 <rect x="780" y="20" width="245" height="88" rx="8" class="box"/><text x="903" y="54" text-anchor="middle" class="s">null-sheet causal</text><text x="903" y="78" text-anchor="middle" class="s">spectroscopy</text>
 <path d="M195 64 H255 M455 64 H515 M715 64 H775" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

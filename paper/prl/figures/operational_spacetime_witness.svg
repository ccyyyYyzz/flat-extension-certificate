  <path d="M170 0V196 M340 0V196 M510 0V196 M0 49H680 M0 98H680 M0 147H680" stroke="#aaa"/>
  <g class="s" text-anchor="middle"><text x="85" y="32">0</text><text x="255" y="32">0</text><text x="425" y="32">0</text><text x="595" y="32">0</text><text x="85" y="81">0.71</text><text x="255" y="81">0</text><text x="425" y="81">0</text><text x="595" y="81">0</text><text x="85" y="130">0</text><text x="255" y="130">1</text><text x="425" y="130">0</text><text x="595" y="130">0</text><text x="85" y="179">0</text><text x="255" y="179">1</text><text x="425" y="179">+1</text><text x="595" y="179">+1</text></g>
 </g>
</g>
<text x="25" y="510" class="t">c  Deeper protocols reveal hidden directions</text>
<g transform="translate(65,535)"><path d="M0 125H410 M0 125V0" class="axis"/><path d="M0 95 L130 95 L260 95 L390 95" class="line1"/><path d="M0 95 L130 42 L260 42 L390 42" class="line2"/><path d="M0 95 L130 95 L260 42 L390 42" class="line3"/><g class="sm"><text x="-20" y="100">3</text><text x="-20" y="47">4</text><text x="0" y="150">1</text><text x="130" y="150">2</text><text x="260" y="150">3</text><text x="390" y="150">4</text><text x="135" y="174">registered depth k</text><text x="280" y="16" fill="#1f77b4">closed</text><text x="280" y="35" fill="#d95f02">commutator</text><text x="280" y="54" fill="#7570b3">ramified</text></g></g>
<text x="565" y="510" class="t">d  Gapped collective CAD</text>
<g transform="translate(600,535)"><path d="M0 125H410 M0 125V0" class="axis"/><path d="M0 5 C80 45,160 80,390 120" class="line1"/><path d="M0 5 C65 65,145 102,390 124" class="line2"/><path d="M0 5 C50 85,130 117,390 125" class="line3"/><g class="sm"><text x="125" y="174">conversion scale</text><text x="210" y="23">larger connection gap → faster suppression</text><text x="-35" y="10">1</text><text x="-35" y="128">0</text></g></g>
